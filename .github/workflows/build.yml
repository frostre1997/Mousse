name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [Android64, Android32]

    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Geode CLI
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | \
            grep -o '"browser_download_url": "[^"]*linux[^"]*"' | head -1 | cut -d '"' -f 4)
          curl -L "$DOWNLOAD_URL" -o geode
          chmod +x geode
          sudo mv geode /usr/local/bin/

      - name: Install SDK (explicit)
        run: geode sdk install nightly   # avoids relying on mod.json

      - name: Build
        run: geode build --platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MouseOnAndroid-${{ matrix.platform }}
          path: build/*.geode
