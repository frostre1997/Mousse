name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [Android64, Android32]

    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Geode CLI
        run: |
          # 1. Fetch the list of assets from the latest release
          ASSETS=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | jq -r '.assets[].name')
          echo "Available assets:"
          echo "$ASSETS"
          
          # 2. Select the Linux x86_64 binary
          ASSET_NAME=$(echo "$ASSETS" | grep -E 'linux.*x86_64|linux.*amd64' | head -1)
          if [ -z "$ASSET_NAME" ]; then
            # fallback: any Linux binary
            ASSET_NAME=$(echo "$ASSETS" | grep -i linux | head -1)
          fi
          echo "Selected asset: $ASSET_NAME"
          
          # 3. Get the download URL
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | \
            jq -r --arg name "$ASSET_NAME" '.assets[] | select(.name == $name) | .browser_download_url')
          echo "Download URL: $DOWNLOAD_URL"
          
          # 4. Download and install
          curl -L "$DOWNLOAD_URL" -o geode
          chmod +x geode
          sudo mv geode /usr/local/bin/
          
          # 5. Verify the binary
          file /usr/local/bin/geode
          /usr/local/bin/geode --version || echo "Binary failed to run"

      - name: Install SDK
        run: geode sdk install nightly

      - name: Build
        run: geode build --platform ${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MouseOnAndroid-${{ matrix.platform }}
          path: build/*.geode
