name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Geode
        uses: geode-sdk/build-geode-mod@main  # Fixed action name
        with:
          cli: nightly
          sdk: nightly
          target: ${{ matrix.config.target }}  # The action handles NDK setup automatically

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GeodeMod-${{ matrix.config.name }}
          path: build/*.geode
