name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android64
            target: android64
          - name: Android32
            target: android32

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/geode-sdk/build:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DGEODE_TARGET_PLATFORM=${{ matrix.config.target }} -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build . --config RelWithDebInfo --target package -j $(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GeodeMod-${{ matrix.config.name }}
          path: build/*.geode
