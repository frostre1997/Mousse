name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android64
            os: ubuntu-latest
            abi: arm64-v8a
            platform: 24
          - name: Android32
            os: ubuntu-latest
            abi: armeabi-v7a
            platform: 24

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    env:
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r23c
      GEODE_SDK_DIR: ${{ github.workspace }}/.geode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          add-to-path: false

      - name: Install Geode CLI
        run: |
          # Get the latest version from GitHub API
          LATEST_VERSION=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | grep -oP '"tag_name": "\K(.*?)(?=")')
          echo "Latest version: $LATEST_VERSION"
          
          # Download the correct binary
          curl -L "https://github.com/geode-sdk/cli/releases/download/${LATEST_VERSION}/geode-linux" -o geode
          chmod +x geode
          sudo mv geode /usr/local/bin/
          
          # Verify installation
          geode --version

      - name: Install Geode SDK
        run: |
          mkdir -p $GEODE_SDK_DIR
          git clone --depth 1 --branch nightly https://github.com/geode-sdk/sdk.git $GEODE_SDK_DIR/sdk

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.config.platform }} \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DGEODE_SDK_DIR=$GEODE_SDK_DIR/sdk \
            -DGEODE_TARGET_PLATFORM=${{ matrix.config.name }}

      - name: Build
        run: |
          cmake --build build --config RelWithDebInfo --target package -j $(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GeodeMod-${{ matrix.config.name }}
          path: build/*.geode
