name: Build Geode Mod (Android)

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]

jobs:
  build-android:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [android64, android32]

    env:
      ANDROID_NDK: /opt/android-ndk-r28  # or download as you do

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI & SDK
        run: |
          curl -fsSL https://get.geode-sdk.org/install.sh | bash -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          geode --version
          geode sdk install nightly   # or a specific version like 5.8.1

      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip -d /opt
          sudo chown -R $USER:$USER /opt/android-ndk-r28

      - name: Build mod
        run: |
          geode build -p ${{ matrix.platform }} --config Release --ndk "$ANDROID_NDK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseOnAndroid-${{ matrix.platform }}
          path: build-${{ matrix.platform }}/*.geode
          if-no-files-found: error
