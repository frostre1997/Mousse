name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android64
            abi: arm64-v8a
            platform: 24
          - name: Android32
            abi: armeabi-v7a
            platform: 24

    name: ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup NDK (official action)
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      # Install any missing dependencies (CMake is already installed)
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # Clone the Geode SDK into a fixed location
      - name: Clone Geode SDK
        run: |
          git clone --depth 1 --branch main https://github.com/geode-sdk/sdk.git $HOME/geode-sdk

      # Configure CMake
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.config.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.config.platform }} \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DGEODE_SDK_DIR=$HOME/geode-sdk \
            -DGEODE_TARGET_PLATFORM=${{ matrix.config.name }} \
            -DCMAKE_MODULE_PATH=$HOME/geode-sdk/cmake

      # Build
      - name: Build
        run: |
          cmake --build build --config RelWithDebInfo -j $(nproc)

      # Package (creates .geode file)
      - name: Package
        run: |
          cmake --build build --target package

      # Upload the mod package
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MouseOnAndroid-${{ matrix.config.name }}
          path: build/*.geode
