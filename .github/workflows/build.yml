name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android64
            os: ubuntu-latest
          - name: Android32
            os: ubuntu-latest

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # This is the official action that should work
      - name: Setup Geode
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.name }}
          cli: latest
          sdk: latest

      # The action should have set up everything, but if not, try this
      - name: Build with CMake
        run: |
          # Use the Geode CLI to build
          geode build
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GeodeMod-${{ matrix.config.name }}
          path: |
            build/*.geode
            *.geode
