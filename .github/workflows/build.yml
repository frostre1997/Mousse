name: Build Geode Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            cmake-args: -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/android-ndk-r23c/build/cmake/android.toolchain.cmake -DANDROID_ABI=armeabi-v7a -DANDROID_PLATFORM=24

          - name: Android64
            os: ubuntu-latest
            cmake-args: -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/android-ndk-r23c/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=24

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode@main
        with:
          cli: nightly
          sdk: nightly
          
      - name: Configure CMake
        run: |
          cmake -B build ${{ matrix.config.cmake-args }} -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: |
          cmake --build build --config RelWithDebInfo -j $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Package
        run: |
          cmake --build build --config RelWithDebInfo --target package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GeodeMod-${{ matrix.config.name }}
          path: build/*.geode
          
